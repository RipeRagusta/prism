<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,interactive-widget=resizes-content">
    <title>Total Prism</title>
    <meta name="description" content="total prism is a website">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" type="image" href="./favicon.png">
    <script src="./script.js"></script>

    <noscript>
        <style>
            header button{
                cursor: default; !important;
            }
        </style>
    </noscript>
    
</head>
<body onload="initalize()">
    <main>
        <header>
            <button onclick="flipLogo()">
                <img src="./logo.svg" id="logo" width="174.073888889" height="151.003855422" alt="Logo">
            </button>
            <h1 id="title">Total Prism</h1>
        </header>
        <h2>Games:</h2>
        <nav>
            <ul class="imagegallery">
                <li class="imagelink">
                    <a href="./housecall/index.html" class="button">
                        <img src="./MAIN_ASSETS/hcthumb.png" width="383" height="304" alt="Thumbnail">
                        <h3>House Call</h3>
                        <p>A short 2D action game that uses the mouse to aim and block</p>
                    </a>
                </li>
                <li class="imagelink">
                    <a href="./cyberclicker/index.html" class="button">
                        <img src="./MAIN_ASSETS/ccthumb.png" width="383" height="304" alt="Thumbnail">
                        <h3>Cyber Clicker 2101</h3>
                        <p>Clicker game</p>
                    </a>
                </li>
            </ul>
        </nav>
        <h2>Prototypes:</h2>
        <nav>
            <ul class="imagegallery">
                <li class="imagelink">
                    <a href="./jumpgame/index.html" class="button">
                        <img src="./MAIN_ASSETS/jgthumb.png" width="383" height="304" alt="Thumbnail">
                        <h3>Jump Game</h3>
                        <p>Jumping game</p>
                    </a>
                </li>
            </ul>
        </nav>
    </main>
    <footer>
            <div id="footercontent">
                <nav id="footerlinks">
                    <ul>
                        <li>
                             <a href="https://totalprism.itch.io/"><small id="copyright">totalprism.itch.io</small></a>
                        </li>
                    </ul>
                </nav>
            </div>
    </footer>
</body>
</html>
